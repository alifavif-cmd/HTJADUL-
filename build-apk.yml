name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH
      - name: Build Project
        run: |
          mkdir -p app/src/main/java/com/htjulianto/app
          mkdir -p app/src/main/res/{values,mipmap-hdpi,mipmap-mdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}

          # Icon - 1x1 PNG pakai base64, tidak perlu PIL/ImageMagick
          B64="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAIAAACQd1PeAAAADklEQVQI12P4z8BQDwAEgAF/QualIQAAAABJRU5ErkJggg=="
          for f in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            echo $B64 | base64 -d > app/src/main/res/$f/ic_launcher.png
            cp app/src/main/res/$f/ic_launcher.png app/src/main/res/$f/ic_launcher_round.png
          done

          cat > settings.gradle << 'EOF'
          rootProject.name = "HTJulianto"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
            namespace "com.htjulianto.app"
            compileSdk 34
            defaultConfig {
              applicationId "com.htjulianto.app"
              minSdk 21; targetSdk 34
              versionCode 1; versionName "1.0"
            }
            buildTypes { release { minifyEnabled false } }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_1_8
              targetCompatibility JavaVersion.VERSION_1_8
            }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name=\"android.permission.INTERNET\"/>
              <uses-permission android:name=\"android.permission.RECORD_AUDIO\"/>
              <uses-permission android:name=\"android.permission.MODIFY_AUDIO_SETTINGS\"/>
            <application android:label="HT Julianto" android:icon="@mipmap/ic_launcher" android:usesCleartextTraffic="true">
              <activity android:name=".MainActivity" android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">HT Julianto</string></resources>
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"/></resources>
          EOF

          cat > app/src/main/java/com/htjulianto/app/MainActivity.java << 'EOF'
          package com.htjulianto.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebViewClient;
          public class MainActivity extends Activity {
            private WebView w;
            @Override protected void onCreate(Bundle s) {
              super.onCreate(s);
              w = new WebView(this);
              setContentView(w);
              WebSettings ws = w.getSettings();
              ws.setJavaScriptEnabled(true);
              ws.setDomStorageEnabled(true);
              ws.setMediaPlaybackRequiresUserGesture(false);
              ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
              w.setWebViewClient(new WebViewClient());
              w.setWebChromeClient(new WebChromeClient() {
                @Override
                public void onPermissionRequest(PermissionRequest request) {
                  request.grant(request.getResources());
                }
              });
              w.loadUrl("https://alifavif-cmd.github.io/HTJADUL-/");
            }
            @Override public void onBackPressed() {
              if (w.canGoBack()) w.goBack();
              else super.onBackPressed();
            }
          }
          EOF

      - name: Gradle Wrapper
        run: gradle wrapper --gradle-version=8.2
      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: HT-Julianto-APK
          path: app/build/outputs/apk/debug/app-debug.apk
